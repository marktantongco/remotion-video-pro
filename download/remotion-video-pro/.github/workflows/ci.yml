name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test

jobs:
  # Gate 1: TypeScript type-check
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  # Gate 2: Lint + secrets scan
  lint:
    name: Lint & Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check for committed secrets
        run: |
          git diff --cached --diff-filter=A --name-only ':(exclude).env.example' | xargs -r grep -lE '(sk_live|sk_test|whsec_|SECRET_KEY|PRIVATE_KEY)' && exit 1 || true
      - name: Validate no .env files committed
        run: |
          if git ls-files '*.env' '*.env.local' '*.env.production' | grep -q .; then
            echo "ERROR: .env files detected in git tracked files"
            exit 1
          fi
          echo "No .env files committed"

  # Gate 3: Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  # Gate 4: Composition validation
  validate:
    name: Validate Compositions
    runs-on: ubuntu-latest
    needs: [typecheck]
    defaults:
      run:
        working-directory: templates/starter-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: templates/starter-project/package-lock.json
      - run: npm ci
      - name: Run composition validator
        run: npx tsx scripts/validate-composition.ts
      - name: Run test harness
        run: npx tsx tests/run-all.ts
