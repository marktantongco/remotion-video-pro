name: CI — Validate, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Gate 1: TypeScript type check ──
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Gate 2: Lint / security scan ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Check for secrets in code
        run: |
          if rg -l '(SK|sk)_live_|(SK|sk)_test_|whsec_|xk_live_' src/ --type ts --type tsx; then
            echo "ERROR: Potential Stripe/Remotion secrets found in source code"
            exit 1
          fi
          echo "No secrets detected"

  # ── Gate 3: Build check ──
  build:
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  # ── Gate 4: Composition validation ──
  validate-composition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run composition validator
        run: |
          if [ -f "scripts/validate-composition.ts" ]; then
            npx tsx scripts/validate-composition.ts
            echo "Composition validation passed"
          else
            echo "No validator found — skipping composition check"
          fi

  # ── Gate 5: Remotion bundle + test harness (before Lambda deploy) ──
  validate-lambda:
    needs: [typecheck, lint, validate-composition]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run test harness
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test
          fi
      - name: Verify Remotion bundle
        run: |
          npx remotion bundle src/index.ts --out-dir out/bundle
          echo "Bundle successful"
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-bundle
          path: out/bundle
          retention-days: 1

  # ── Deploy Lambda (main only, after all gates pass) ──
  deploy-lambda:
    needs: validate-lambda
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Deploy Lambda functions
        run: npx remotion lambda functions deploy
        env:
          REMOTION_AWS_ACCESS_KEY_ID: ${{ secrets.REMOTION_AWS_ACCESS_KEY_ID }}
          REMOTION_AWS_SECRET_ACCESS_KEY: ${{ secrets.REMOTION_AWS_SECRET_ACCESS_KEY }}
          REMOTION_AWS_REGION: ${{ secrets.REMOTION_AWS_REGION || 'us-east-1' }}
      - name: Create Lambda serve site
        run: npx remotion lambda sites create src/index.ts
        env:
          REMOTION_AWS_ACCESS_KEY_ID: ${{ secrets.REMOTION_AWS_ACCESS_KEY_ID }}
          REMOTION_AWS_SECRET_ACCESS_KEY: ${{ secrets.REMOTION_AWS_SECRET_ACCESS_KEY }}
          REMOTION_AWS_REGION: ${{ secrets.REMOTION_AWS_REGION || 'us-east-1' }}

  # ── Deploy to Railway (main only, after all gates pass) ──
  deploy-api:
    needs: [build, validate-composition]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Railway API deploy
        run: |
          curl -X POST "${{ secrets.RAILWAY_WEBHOOK_URL_API }}" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json"

  deploy-worker:
    needs: [build, validate-composition]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Railway Worker deploy
        run: |
          curl -X POST "${{ secrets.RAILWAY_WEBHOOK_URL_WORKER }}" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json"
